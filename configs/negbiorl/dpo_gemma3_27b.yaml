# DPO config for Gemma3-27B-it (4-bit pre-quantized)
# Tests whether DPO conservatism persists at 27B scale

model: unsloth/gemma-3-27b-it-bnb-4bit

beta: 0.1
learning_rate: 5.0e-7
epochs: 2
batch_size: 1
gradient_accumulation_steps: 8
max_length: 1536

# LoRA (same as GRPO config for fair comparison)
lora_r: 16
lora_alpha: 32
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Model loading
load_in_4bit: false   # model is pre-quantized (embedded bnb config)

# Logging
report_to: wandb
