# DPO config for Qwen2.5-7B-Instruct (method ablation: GRPO vs DPO)

model: Qwen/Qwen2.5-7B-Instruct

# DPO hyperparameters
learning_rate: 5.0e-7
epochs: 2
batch_size: 1
gradient_accumulation_steps: 4
beta: 0.1
max_length: 1536

# LoRA
lora_r: 64
lora_alpha: 128
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Logging
report_to: wandb
