# GRPO training config for Qwen2.5-7B-Instruct (historical baseline)

model: Qwen/Qwen2.5-7B-Instruct

# GRPO hyperparameters
num_generations: 8
learning_rate: 1.0e-6
epochs: 2
batch_size: 2
max_completion_length: 512

# LoRA
lora_r: 64
lora_alpha: 128
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# vLLM
use_vllm: false

# Rewards
reward_weights: [1.0, 1.0, 0.2, 0.1]  # l1, l4, evidence, format

# Logging
report_to: wandb
